services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: findings
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d findings"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/findings?sslmode=disable
      JWT_SECRET: ubah-ini-minimal-32-karakter-rahasia-jwt-demo
      BASIC_AUTH_USER: admin
      BASIC_AUTH_PASSWORD: admin
      SERVICE_NAME: findings-api
      SERVICE_VERSION: 0.1.0
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
