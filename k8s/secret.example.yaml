# Contoh secret — salin ke secret.yaml (lihat README) atau terapkan langsung hanya untuk cluster dev.
# JANGAN pakai nilai demo di production. Ganti JWT_SECRET dan password DB.
---
apiVersion: v1
kind: Secret
metadata:
  name: findings-db
  namespace: findings
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: findings-api
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: findings
---
apiVersion: v1
kind: Secret
metadata:
  name: findings-api
  namespace: findings
  labels:
    app.kubernetes.io/name: findings-api
type: Opaque
stringData:
  # Host DNS: Service postgres di namespace yang sama
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/findings?sslmode=disable
  JWT_SECRET: ubah-ini-minimal-32-karakter-rahasia-jwt-demo
  BASIC_AUTH_USER: admin
  BASIC_AUTH_PASSWORD: admin
